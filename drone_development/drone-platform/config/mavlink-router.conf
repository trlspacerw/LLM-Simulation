# mavlink-router configuration for the drone platform.
#
#   SITL --out=udp:127.0.0.1:14550  -->  [sitl] (UDP server, listens)
#                                          |
#                  +-----------------------+------------------------+
#                  |                       |                        |
#            [gateway]               TcpServerPort            [local-gcs]
#         udp -> 127.0.0.1:14551       tcp :5760           udp -> 127.0.0.1:14552
#         (FastAPI / pymavlink)     (ngrok -> remote        (optional QGC on this
#                                    QGC / MissionPlanner)   machine for debugging)

[General]
# Raw MAVLink TCP endpoint for remote GCS clients (exposed via ngrok tcp).
# 5761, not 5760: SITL's own serial0 already listens on TCP 5760 on this
# machine, so the router must use a different port.
TcpServerPort = 5761
ReportStats = false
MavlinkDialect = auto

# SITL output lands here. Server mode = the router binds and listens on this
# port; sim_vehicle.py sends to it with --out=udp:127.0.0.1:14550.
[UdpEndpoint sitl]
Mode = Server
Address = 0.0.0.0
Port = 14550

# FastAPI gateway. Normal mode = the router sends to this address; the
# gateway listens there with pymavlink udpin:0.0.0.0:14551.
[UdpEndpoint gateway]
Mode = Normal
Address = 127.0.0.1
Port = 14551

# Optional local GCS for debugging. Configure QGroundControl/MAVProxy on this
# machine to listen on UDP 14552.
[UdpEndpoint local-gcs]
Mode = Normal
Address = 127.0.0.1
Port = 14552
